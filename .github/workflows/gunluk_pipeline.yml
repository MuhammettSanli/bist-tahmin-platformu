name: Gunluk Pipeline

on:
  schedule:
    # Her is gunu 18:30 Turkiye saati (UTC+3) = 15:30 UTC
    - cron: '30 15 * * 1-5'
  workflow_dispatch:
    # Manuel tetikleme: GitHub > Actions > Gunluk Pipeline > Run workflow

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Repo indir
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python 3.11 kur
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Bagimliliklar
        run: |
          pip install --upgrade pip
          pip install yfinance xgboost lightgbm scikit-learn pandas numpy joblib python-dotenv requests beautifulsoup4 transformers torch
          pip install pandas_ta || pip install pandas_ta --no-build-isolation || echo "pandas_ta kurulamadi, devam ediliyor"

      - name: Finansal veri guncelle
        run: python collectors/veri_cekici.py

      - name: Haberleri topla
        run: python collectors/haber_toplayici.py

      - name: Duygu analizi (BERT)
        run: python ml/duygu_analizi.py

      - name: Modelleri yeniden egit
        run: python ml/model_egitimi.py

      - name: Degisiklikleri kaydet
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          git add data/borsa.db models/
          if git diff --staged --quiet; then
            echo "Degisiklik yok, commit atlanadi."
          else
            git commit -m "auto: $(date +'%Y-%m-%d') finansal veri ve model guncellendi"
            git push
          fi
