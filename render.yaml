services:
  - type: web
    name: bist-tahmin-platformu
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    envVars:
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: ADMIN_SIFRE_HASH
        sync: false
